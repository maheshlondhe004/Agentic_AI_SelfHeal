<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Demo App — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .logo h1 { color: #e0e0ff; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
    .logo p  { color: #8888cc; font-size: 0.85rem; margin-top: 4px; }

    label { display: block; color: #aabbdd; font-size: 0.82rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }

    input[type="text"], input[type="password"] {
      width: 100%; padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px; color: #e8eaf6;
      font-size: 0.95rem; outline: none; transition: border-color 0.2s;
      margin-bottom: 1.2rem;
    }
    input:focus { border-color: #7c83fd; background: rgba(124,131,253,0.1); }

    button#loginBtn {
      width: 100%; padding: 0.85rem;
      background: linear-gradient(90deg, #7c83fd, #56cfe1);
      border: none; border-radius: 10px; color: #fff;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button#loginBtn:hover  { opacity: 0.88; }
    button#loginBtn:active { transform: scale(0.98); }

    #error-msg {
      display: none; margin-top: 1rem; padding: 0.75rem 1rem;
      background: rgba(255, 80, 80, 0.18);
      border: 1px solid rgba(255, 80, 80, 0.45);
      border-radius: 8px; color: #ff8080; font-size: 0.88rem; text-align: center;
    }
    #success-msg {
      display: none; margin-top: 1rem; padding: 0.75rem 1rem;
      background: rgba(80, 220, 130, 0.18);
      border: 1px solid rgba(80, 220, 130, 0.45);
      border-radius: 8px; color: #50e890; font-size: 0.88rem; text-align: center;
    }

    .hint { margin-top: 1.2rem; text-align: center; color: #666899; font-size: 0.78rem; }
    .hint span { color: #9cadff; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>🤖 Demo App</h1>
      <p>Self-Healing Framework — Local Test Page</p>
    </div>

    <form id="login-form" onsubmit="return false;">
      <label for="username">Username</label>
      <input type="text"     id="username" name="username" placeholder="Enter username" autocomplete="off"/>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="off"/>

      <button type="button" id="loginBtn" onclick="doLogin()">Login</button>
    </form>

    <div id="error-msg">❌ Invalid username or password. Please try again.</div>
    <div id="success-msg">✅ Login successful! Welcome, <span id="user-display"></span>.</div>

    <p class="hint">Demo credentials — user: <span>admin</span> / pass: <span>test123</span></p>
  </div>

  <script>
    const VALID_USERS = {
      "admin":   { password: "test123",   display: "Admin User" },
      "qa-user": { password: "qapass456", display: "QA Engineer" }
    };

    function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('error-msg');
      const okEl     = document.getElementById('success-msg');

      errEl.style.display = 'none';
      okEl.style.display  = 'none';

      if (!username || !password) {
        errEl.textContent    = '❌ Username and password are required.';
        errEl.style.display  = 'block';
        return;
      }

      const user = VALID_USERS[username];
      if (user && user.password === password) {
        document.getElementById('user-display').textContent = user.display;
        okEl.style.display = 'block';
      } else {
        errEl.textContent   = '❌ Invalid username or password. Please try again.';
        errEl.style.display = 'block';
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
